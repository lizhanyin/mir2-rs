<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta name="login_page">
  <meta charset="UTF-8">
  <title>热血传奇 - 登录</title>
  <link rel="stylesheet" href="base.css">
  <link rel="stylesheet" href="login.css">
</head>

<body>

  <div class="login-container">
    <div class="login-box">
      <h1 class="title"><label>热血传奇</label></h1>
      <p class="subtitle">The Legend of Mir 2</p>

      <form class="login-form" action="on_login" validate="登录">
        <div class="form-group">
          <label for="username">账号</label>
          <input id="username"
                 name="username"
                 type="text"
                 placeholder="请输入账号"
                 required
                 validation="length(3, 32)">
        </div>

        <div class="form-group">
          <label for="password">密码</label>
          <input id="password"
                 name="password"
                 type="password"
                 placeholder="请输入密码"
                 required
                 validation="length(6, 64)">
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-login">登 录</button>
        </div>

        <div class="form-links">
          <a href="#" action="on_register">注册账号</a>
          <a href="#" action="on_forgot">忘记密码</a>
        </div>
      </form>
    </div>

    <div class="footer">
      <p>Mir2-RS v0.1.0 | Bevy Engine</p>
    </div>
  </div>

</body>

</html>
