<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta name="login_page">
  <meta charset="UTF-8">
  <title>热血传奇 - 登录</title>
  <link rel="stylesheet" href="base.css">
  <link rel="stylesheet" href="login.css">
</head>

<body>

  <div class="login-container">
    <div class="login-box">
      <div class="box-title">
        <div class="btn-close-container">
          <button type="button" class="btn-close"
              onmousedown="btn_press"
              onmouseup="btn_release"
              ondragstart="on_drag_start"
              ondragstop="on_drag_stop"
              onclick="on_close">
          </button>
        </div>
      </div>
      <form class="login-form" action="on_login" validate="登录">
        <div class="form-group empty-row"></div>
        <div class="form-group empty-row"></div>
        <div class="form-group">
          <label for="username"></label>
          <input id="username" name="username" type="text" placeholder="" required validation="length(3, 32)">
        </div>

        <div class="form-group">
          <label for="password"></label>
          <input id="password" name="password" type="password" placeholder="" required validation="length(6, 64)">
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-login">登 录</button>
        </div>

        <div class="form-links">
          <a href="#" action="on_register">注册账号</a>
          <a href="#" action="on_forgot">忘记密码</a>
        </div>
      </form>
      <div class="box-footer"></div>
    </div>
    <!-- 
    <div class="footer">
      <p>Mir2-RS v0.1.0 | Bevy Engine</p>
    </div>
     -->
  </div>

</body>

</html>
